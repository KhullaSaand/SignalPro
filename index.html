<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SignalPro — Live Market Signals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --fm:'Inter','Roboto',-apple-system,system-ui,sans-serif;
  --fmono:'JetBrains Mono','Roboto Mono','Courier New',monospace;
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:#252535;
  --text:#e8e8f0;--muted:#5a5a78;--card:#12121c;
  --green:#00f5a0;--red:#ff4466;--yellow:#ffd166;--blue:#4d8cff;
}
.light{
  --bg:#f0f0f8;--bg2:#e6e6f0;--bg3:#dadaec;--border:#c8c8dc;
  --text:#0d0d20;--muted:#5a5a78;--card:#ffffff;
  --green:#00915e;--red:#cc1133;--yellow:#b07000;--blue:#1a44cc;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:var(--fm);background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-size:1.25rem;font-weight:900;letter-spacing:-1px;}.logo b{color:var(--green);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.live-badge{display:flex;align-items:center;gap:4px;background:rgba(0,245,160,0.1);border:1px solid rgba(0,245,160,0.2);border-radius:20px;padding:4px 10px;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.live-lbl{font-size:0.65rem;font-weight:700;color:var(--green);font-family:var(--fmono);}
.theme-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:14px;cursor:pointer;font-size:0.7rem;font-weight:600;}

/* MARKET TABS */
.mkt-tabs{display:flex;padding:8px 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;gap:2px;}
.mkt-tab{padding:7px 13px;border-radius:7px 7px 0 0;cursor:pointer;font-size:0.75rem;font-weight:700;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--muted);white-space:nowrap;transition:all 0.15s;}
.mkt-tab.active{background:var(--bg);color:var(--green);border-color:var(--border);border-bottom-color:var(--bg);}

/* TICKER */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);height:30px;overflow:hidden;position:relative;}
.ticker-track{display:flex;position:absolute;animation:scroll-ticker 60s linear infinite;white-space:nowrap;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.t-item{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:30px;border-right:1px solid var(--border);font-family:var(--fmono);font-size:0.68rem;}
.t-sym{font-weight:700;}
.t-up{color:var(--green);}
.t-dn{color:var(--red);}

/* INDICES PINNED */
.indices-bar{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.indices-bar-inner{display:flex;gap:8px;min-width:max-content;}
.idx-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;min-width:110px;flex-shrink:0;}
.idx-name{font-size:0.6rem;color:var(--muted);font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idx-price{font-size:0.88rem;font-weight:700;font-family:var(--fmono);}
.idx-chg{font-size:0.65rem;font-family:var(--fmono);font-weight:600;margin-top:1px;}
.idx-chg.up{color:var(--green);}
.idx-chg.dn{color:var(--red);}
.idx-loading{font-size:0.65rem;color:var(--muted);font-family:var(--fmono);}

/* FILTER CHIPS */
.filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg);}
.filter-inner{display:flex;gap:6px;min-width:max-content;}
.chip{padding:5px 12px;border-radius:16px;font-size:0.7rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);white-space:nowrap;transition:all 0.15s;}
.chip.active{background:var(--green);color:var(--bg);border-color:var(--green);}

/* SEARCH + REFRESH */
.ctrl-bar{display:flex;gap:8px;padding:10px 16px;background:var(--bg);}
.s-inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);font-family:var(--fm);font-size:0.82rem;outline:none;}
.s-inp:focus{border-color:var(--green);}
.s-inp::placeholder{color:var(--muted);}
.ref-btn{background:transparent;border:1px solid var(--green);color:var(--green);padding:8px 13px;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.75rem;}

/* META */
.meta{display:flex;justify-content:space-between;padding:4px 16px 8px;font-family:var(--fmono);font-size:0.65rem;color:var(--muted);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:0 16px 80px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.1s;}
.card:active{transform:scale(0.97);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.card.buy-card::before{background:var(--green);}
.card.sell-card::before{background:var(--red);}
.card.hold-card::before{background:var(--yellow);}
.c-sym{font-size:0.8rem;font-weight:800;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-name{font-size:0.58rem;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-badge{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:4px;font-size:0.58rem;font-weight:700;font-family:var(--fmono);}
.c-badge.BUY{background:rgba(0,245,160,0.13);color:var(--green);}
.c-badge.SELL{background:rgba(255,68,102,0.13);color:var(--red);}
.c-badge.HOLD{background:rgba(255,209,102,0.13);color:var(--yellow);}
.c-price{font-size:1rem;font-weight:700;font-family:var(--fmono);margin-top:7px;letter-spacing:-0.5px;transition:color 0.4s;}
.c-chg{font-size:0.68rem;font-family:var(--fmono);font-weight:600;margin-top:2px;}
.c-chg.up{color:var(--green);}
.c-chg.dn{color:var(--red);}

/* LOADING / ERROR */
.loading{text-align:center;padding:50px 20px;color:var(--muted);font-family:var(--fmono);font-size:0.78rem;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:40px 20px;color:var(--red);font-family:var(--fmono);font-size:0.74rem;line-height:2.2;}
.load-more{text-align:center;padding:16px;font-size:0.75rem;color:var(--muted);font-family:var(--fmono);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi 0.18s;}
@media(min-width:600px){.mo{align-items:center;padding:20px;}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mo-box{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 18px 28px;width:100%;max-width:450px;animation:su 0.2s ease;position:relative;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.mo-box{border-radius:20px;}}
@keyframes su{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-x{position:absolute;top:12px;right:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:0.82rem;display:flex;align-items:center;justify-content:center;}
.mo-sym{font-size:1.4rem;font-weight:900;}
.mo-name{color:var(--muted);font-size:0.75rem;margin-top:2px;}
.mo-price{font-size:1.8rem;font-weight:700;font-family:var(--fmono);margin:10px 0 2px;letter-spacing:-1px;}
.mo-chg{font-size:0.75rem;font-family:var(--fmono);font-weight:600;}
.mo-chg.up{color:var(--green);}
.mo-chg.dn{color:var(--red);}
.sig-box{padding:10px 14px;border-radius:10px;font-size:0.88rem;font-weight:800;text-align:center;margin:12px 0;letter-spacing:0.5px;}
.sig-box.BUY{background:rgba(0,245,160,0.09);color:var(--green);border:1px solid rgba(0,245,160,0.25);}
.sig-box.SELL{background:rgba(255,68,102,0.09);color:var(--red);border:1px solid rgba(255,68,102,0.25);}
.sig-box.HOLD{background:rgba(255,209,102,0.09);color:var(--yellow);border:1px solid rgba(255,209,102,0.25);}
.lvs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.lv{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 11px;}
.lv-lbl{font-size:0.58rem;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.lv-val{font-size:0.88rem;font-weight:700;font-family:var(--fmono);}
.lv-val.e{color:var(--blue);}
.lv-val.tp{color:var(--green);}
.lv-val.sl{color:var(--red);}
.ind-sec{margin-top:13px;}
.ind-ttl{font-size:0.63rem;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:6px;}
.ind-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);gap:5px;}
.ind-row:last-child{border-bottom:none;}
.ind-n{color:var(--muted);font-family:var(--fmono);font-size:0.66rem;}
.ind-v{font-weight:700;font-family:var(--fmono);font-size:0.7rem;}
.ind-s{font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:3px;}
.ind-s.bull{background:rgba(0,245,160,0.13);color:var(--green);}
.ind-s.bear{background:rgba(255,68,102,0.13);color:var(--red);}
.ind-s.neut{background:rgba(255,209,102,0.13);color:var(--yellow);}
.mo-disc{font-size:0.6rem;color:var(--muted);text-align:center;margin-top:12px;padding-top:11px;border-top:1px solid var(--border);line-height:1.6;}

/* OPTION CHAIN */
.oc-scr{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;}
.oc-hdr{display:flex;align-items:center;gap:9px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
.oc-back{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:0.72rem;font-weight:700;}
.oc-title{font-size:0.92rem;font-weight:800;flex:1;}.oc-title b{color:var(--green);}
.oc-mkt-tabs{display:flex;gap:5px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.oc-mt{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:700;background:var(--bg3);color:var(--muted);border:1px solid var(--border);white-space:nowrap;}
.oc-mt.active{background:var(--green);color:var(--bg);border-color:var(--green);}
.oc-ctrl{display:flex;gap:6px;padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.oc-sel{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:0.75rem;outline:none;}
.oc-btn{background:var(--green);border:none;color:var(--bg);padding:6px 14px;border-radius:7px;font-weight:800;font-size:0.72rem;cursor:pointer;}
.oc-spot{font-size:0.7rem;color:var(--muted);font-family:var(--fmono);margin-left:auto;}
.oc-spot b{color:var(--green);}
.oc-body{flex:1;overflow-y:auto;}
.oc-exp-lbl{font-size:0.62rem;color:var(--muted);font-family:var(--fmono);padding:7px 16px 3px;letter-spacing:1px;text-transform:uppercase;}
.oc-tbl{width:100%;border-collapse:collapse;}
.oc-tbl tr.atm{background:rgba(99,179,237,0.08);border-top:1px solid rgba(99,179,237,0.3);border-bottom:1px solid rgba(99,179,237,0.3);}
.oc-tbl tr.atm .sk{color:var(--blue);font-weight:700;}
.oc-sig{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.6rem;font-weight:700;letter-spacing:0.5px;}
.oc-sig.BUY{background:rgba(72,199,142,0.15);color:var(--green);border:1px solid rgba(72,199,142,0.3);}
.oc-sig.SELL{background:rgba(255,99,132,0.15);color:var(--red);border:1px solid rgba(255,99,132,0.3);}
.oc-sig.HOLD{background:rgba(255,193,7,0.12);color:var(--yellow);border:1px solid rgba(255,193,7,0.25);}
.oc-tbl th{font-size:0.58rem;font-weight:700;color:var(--muted);padding:6px 4px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;letter-spacing:0.5px;}
.oc-tbl td{font-size:0.68rem;padding:6px 4px;text-align:center;border-bottom:1px solid var(--border);font-family:var(--fmono);}
.oc-tbl tr.atm td{background:rgba(0,245,160,0.05);}
.oc-tbl tr.atm .sk{color:var(--green);font-weight:800;}
.c-side{color:#7eb8ff;}.p-side{color:#ffb3c6;}
.sk{font-weight:700;background:var(--bg3)!important;font-size:0.7rem;}
.oc-sig.BUY{color:var(--green);font-weight:800;font-size:0.6rem;}
.oc-sig.SELL{color:var(--red);font-weight:800;font-size:0.6rem;}
.oc-sig.HOLD{color:var(--yellow);font-weight:700;font-size:0.6rem;}
.oc-foot{padding:10px 16px;font-size:0.6rem;color:var(--muted);font-family:var(--fmono);line-height:1.9;border-top:1px solid var(--border);}
/* WS speed indicator */
.ws-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(77,140,255,0.12);border:1px solid rgba(77,140,255,0.25);border-radius:12px;padding:3px 8px;font-size:0.62rem;color:var(--blue);font-family:var(--fmono);font-weight:700;}
</style>
</head>

// ═══════════════════════════════════════════════════════
// SIGNALPRO — COMPLETE CLEAN SCRIPT
// All functions defined. No patchwork.
// ═══════════════════════════════════════════════════════

// ── API KEYS ──
const AV_KEY   = 'LB7ETS093ZQWNKWB';
const AV_BASE  = 'https://www.alphavantage.co/query';
const avCache  = {};
const AV_TTL   = 60000;

// Use XMLHttpRequest — works on Android local files where fetch() is blocked
function fetchWithTimeout(url, ms) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = ms;
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        resolve({ ok: true, status: xhr.status, text: () => Promise.resolve(xhr.responseText), json: () => Promise.resolve(JSON.parse(xhr.responseText)) });
      } else {
        reject(new Error('HTTP ' + xhr.status));
      }
    };
    xhr.onerror   = () => reject(new Error('network error'));
    xhr.ontimeout = () => reject(new Error('timeout'));
    xhr.send();
  });
}

// ── COINGECKO — Crypto ──
async function fetchCryptoPage(page, perPage) {
  const r = await fetchWithTimeout(    `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=${perPage}&page=${page}&sparkline=false`, 12000);
  if (!r.ok) throw new Error('CoinGecko error ' + r.status);
  return r.json();
}

function getCryptoCat(c) {
  const stables = ['tether','usd-coin','dai','binance-usd','frax','trueusd'];
  if (stables.includes(c.id)) return 'stablecoin';
  const defi = ['uniswap','aave','curve-dao-token','compound-governance-token','maker','synthetix-network-token'];
  if (defi.includes(c.id)) return 'defi';
  return 'crypto';

// ── SIGNAL ENGINE ──
function sig(price, high, low, chg) {
  const rsi  = Math.max(10, Math.min(90, 50 + chg * 2.5));
  const mid  = (high + low) / 2;
  const ma   = price > mid ? 'bull' : 'bear';
  const macd = chg * 0.15 + ((price * 37) % 1 - 0.48) * 0.4;
  let b = 0, s = 0;
  if (rsi < 35) b++; else if (rsi > 65) s++;
  if (ma === 'bull') b++; else s++;
  if (macd > 0) b++; else s++;
  const signal = b >= 2 ? 'BUY' : s >= 2 ? 'SELL' : 'HOLD';
  const atr = Math.max((high - low) * 0.5, price * 0.005);
  return {
    signal, rsi: rsi.toFixed(1), ma, macd: macd.toFixed(4),
    sl: signal === 'BUY' ? price - atr*1.5 : price + atr*1.5,
    tp: signal === 'BUY' ? price + atr*2.5 : price - atr*2.5,
    entry: price,
    rsiSig:  rsi < 40 ? 'bull' : rsi > 60 ? 'bear' : 'neut',
    maSig:   ma,
    macdSig: macd > 0 ? 'bull' : 'bear'
  };
}

// ── FORMAT HELPERS ──
function fp(n, c) {
  if (!n || isNaN(n)) return '--';
  if (c === '₹') return '₹' + n.toLocaleString('en-IN', {maximumFractionDigits:2});
  if (c === '')  return n.toFixed(4);
  if (n >= 10000) return '$' + n.toLocaleString('en-US', {maximumFractionDigits:0});
  if (n >= 100)   return '$' + n.toFixed(2);
  if (n >= 1)     return '$' + n.toFixed(3);
  return '$' + n.toFixed(6);
}
function fl(n, c) {
  if (!n || isNaN(n) || !isFinite(n)) return '--';
  if (c === '₹') return '₹' + n.toFixed(2);
  if (c === '')  return n.toFixed(4);
  if (n >= 10000) return '$' + n.toFixed(0);
  if (n >= 100)   return '$' + n.toFixed(2);
  if (n >= 1)     return '$' + n.toFixed(3);
  return '$' + n.toFixed(6);
}
function fpIdx(n, c) {
  if (!n || isNaN(n)) return '--';
  if (c === '₹' || n > 1000) return n.toLocaleString('en-IN', {maximumFractionDigits:1});
  return n.toFixed(4);
}

const PROXIES = [
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
];

async function proxyGet(url) {
  for (const makeProxy of PROXIES) {
    try {
      const result = await fetchWithTimeout(makeProxy(url), 9000);
      const txt = await result.text();
      if (!txt || txt.length < 10) continue;
      if (txt.startsWith('{') && txt.includes('"contents"')) {
        const w = JSON.parse(txt);
        if (w.contents && w.contents.length > 10) return w.contents;
        continue;
      }
      return txt;
    } catch { continue; }
  }
  return null;
}

// YAHOO FINANCE v7 — batch multi-symbol quotes
// Works for .NS (India), plain tickers (US), indices (^NSEI)
// 20 symbols per request, no auth needed
// ═══════════════════════════════════════════════════════
async function yahooV7Batch(symbols) {
  const symsStr = symbols.join(',');
  const urls = [
    `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symsStr)}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketDayHigh,regularMarketDayLow,regularMarketOpen,shortName`,
    `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symsStr)}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketDayHigh,regularMarketDayLow,regularMarketOpen,shortName`
  ];

  const parse = (txt) => {
    if (!txt || txt.length < 20) return null;
    try {
      // Unwrap allorigins {"contents":"..."} if needed
      let raw = txt;
      if (txt.includes('"contents"')) {
        const w = JSON.parse(txt);
        raw = w.contents || txt;
      }
      const data = JSON.parse(raw);
      const results = data?.quoteResponse?.result;
      if (!results?.length) return null;
      const out = {};
      for (const q of results) {
        const price = q.regularMarketPrice;
        if (!price) continue;
        out[q.symbol.toUpperCase()] = {
          price,
          change: q.regularMarketChangePercent || 0,
          high:   q.regularMarketDayHigh  || price * 1.01,
          low:    q.regularMarketDayLow   || price * 0.99,
          open:   q.regularMarketOpen     || price,
          name:   q.shortName || q.symbol
        };
      }
      return Object.keys(out).length ? out : null;
    } catch { return null; }
  };

  for (const url of urls) {
    // 1. Try direct (no proxy) — works on HTTPS pages, fastest
    try {
      const r = await fetchWithTimeout(url, 8000);
      const txt = await r.text();
      const result = parse(txt);
      if (result) return result;
    } catch {}

    // 2. Try each proxy as fallback
    for (const makeProxy of PROXIES) {
      try {
        const r = await fetchWithTimeout(makeProxy(url), 9000);
        const txt = await r.text();
        const result = parse(txt);
        if (result) return result;
      } catch {}
    }
  }
  return {};
}


async function stooqBatch(symbols) {
  // Alias so liveUpdate still works
  return yahooV7Batch(symbols);
}

async function stooqBatchAll(symbols, currency, cat, nameMap, label) {
  const BATCH    = 20;
  const allQuotes = {};
  const myEpoch  = loadEpoch;

  for (let i = 0; i < symbols.length; i += BATCH) {
    if (loadEpoch !== myEpoch) return {};
    const chunk  = symbols.slice(i, i + BATCH);
    const quotes = await yahooV7Batch(chunk);
    Object.assign(allQuotes, quotes);

    const loaded = Object.keys(allQuotes).length;
    setTimestamp(`${label}: ${loaded}/${symbols.length}…`);

    if (loaded > 0) {
      allItems = buildItems(allQuotes, symbols, nameMap, currency, cat);
      renderActive();
    }
  }
  return allQuotes;
}

function buildItems(quoteMap, symbols, nameMap, currency, cat) {
  // quoteMap keys may be uppercase, symbols may have different case
  const upperMap = {};
  for (const [k, v] of Object.entries(quoteMap)) upperMap[k.toUpperCase()] = v;

  return symbols.map(sym => {
    const key = sym.toUpperCase();
    const q   = upperMap[key];
    if (!q) return null;
    return {
      id:       sym,
      symbol:   sym.replace('.NS','').replace('.BO',''),
      name:     nameMap[sym] || sym,
      price:    q.price,
      change:   q.change,
      high:     q.high,
      low:      q.low,
      open:     q.open,
      currency, cat,
      rawSym:   sym
    };
  }).filter(Boolean);
}

// Keep proxyFetch for indices bar (uses Yahoo v8 for index prices)
async function proxyFetch(sym) {
  const urls = [
    `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2d`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2d`,
  ];
  for (const url of urls) {
    const txt = await proxyGet(url);
    if (!txt) continue;
    try {
      const raw  = JSON.parse(txt);
      const meta = raw?.chart?.result?.[0]?.meta;
      if (meta?.regularMarketPrice) return meta;
    } catch { continue; }
  }
  // Fallback: try stooq for the symbol
  try {
    const q = await stooqBatch([sym]);
    const key = Object.keys(q)[0];
    if (key && q[key].price) {
      return {
        regularMarketPrice:         q[key].price,
        chartPreviousClose:         q[key].open,
        regularMarketDayHigh:       q[key].high,
        regularMarketDayLow:        q[key].low,
      };
    }
  } catch {}
  return null;
}

async function loadForex() {
  const r = await fetchWithTimeout('https://open.er-api.com/v6/latest/USD', 10000);
  if (!r.ok) throw new Error('Forex API error');
  const d = await r.json();
  allItems = FOREX_PAIRS.map(([code, name]) => {
    const rate = d.rates[code] || 0;
    if (!rate) return null;
    let cat = 'major';
    if (['KRW','THB','IDR','MYR','PHP','SGD','HKD','CNY','JPY','INR'].includes(code)) cat = 'asia';
    if (['AED','SAR','QAR','KWD','BHD','OMR'].includes(code)) cat = 'middle';
    return { id:'USD'+code, symbol:'USD/'+code, name:'USD → '+name, price:rate, change:0, high:rate*1.003, low:rate*0.997, currency:'', cat };
  }).filter(Boolean);
  // Fetch top 8 major pairs live from Alpha Vantage
  const majors = ['EUR','GBP','JPY','INR','CAD','AUD','CHF','CNY'];
  for (const code of majors) {
    const av = await fetchAVPair('USD', code);
    if (av) {
      const idx = allItems.findIndex(i => i.id === 'USD' + code);
      if (idx > -1) {
        const prev = allItems[idx].price;
        allItems[idx].price  = av.price;
        allItems[idx].change = prev ? ((av.price - prev) / prev) * 100 : 0;
        allItems[idx].bid    = av.bid;
        allItems[idx].ask    = av.ask;
        updateSingleCard(idx);
      }
    }
    await new Promise(r => setTimeout(r, 300));
  }
}

async function fetchAVPair(from, to) {
  const key = from + to;
  const now = Date.now();
  if (avCache[key] && now - avCache[key].ts < AV_TTL) return avCache[key];
  try {
    const url = `${AV_BASE}?function=CURRENCY_EXCHANGE_RATE&from_currency=${from}&to_currency=${to}&apikey=${AV_KEY}`;
    const r = await fetchWithTimeout(url, 8000);
    if (!r.ok) return null;
    const d = await r.json();
    const info = d['Realtime Currency Exchange Rate'];
    if (!info) return null;
    const result = {
      price: parseFloat(info['5. Exchange Rate']),
      bid:   parseFloat(info['8. Bid Price']),
      ask:   parseFloat(info['9. Ask Price']),
      ts: now
    };
    avCache[key] = result;
    return result;
  } catch { return null; }
}

// LOAD MARKET — with cache
// ═══════════════════════════════════════════════════════
async function loadMkt() {
  const thisMkt = mkt; // ← snapshot NOW — mkt global can change during awaits
  const now     = Date.now();
  const fresh   = cache[thisMkt] && (now - cacheTime[thisMkt]) < CACHE_TTL[thisMkt];

  if (fresh) {
    if (mkt !== thisMkt) return; // tab switched before we could render
    allItems = cache[thisMkt];
    buildFilters();
    renderActive();
    loadIndicesFromCache();
    setTimestamp();
    startLive();
    return;
  }

  if (isLoading[thisMkt]) return;
  isLoading[thisMkt] = true;

  document.getElementById('grid').innerHTML = '<div class="loading"><div class="spinner"></div>Loading ' + thisMkt + '…</div>';
  document.getElementById('meta-count').textContent = '';
  setTimestamp('Fetching…');
  stopLive();

  try {
    if      (thisMkt === 'crypto') await loadCrypto();
    else if (thisMkt === 'india')  await loadIndia();
    else if (thisMkt === 'us')     await loadUS();
    else if (thisMkt === 'forex')  await loadForex();

    // Only save to cache and render if we're STILL on the same tab
    if (mkt !== thisMkt) return;

    cache[thisMkt]     = [...allItems];
    cacheTime[thisMkt] = Date.now();
    renderActive();
    loadIndices();
    setTimestamp();
    startLive();
  } catch (e) {
    if (mkt === thisMkt) // only show error if still on this tab
      document.getElementById('grid').innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
  } finally {
    isLoading[thisMkt] = false;
  }
}

  bar.innerHTML = idxList.map(([,name]) =>
    `<div class="idx-card"><div class="idx-name">${name}</div><div class="idx-loading">Loading…</div></div>`
  ).join('');

  idxList.forEach(async ([sym, name], i) => {
    try {
      if (mkt !== thisMkt) return; // tab switched — discard
      const meta  = await proxyFetch(sym);
      if (mkt !== thisMkt) return; // tab switched while fetching — discard
      const cards = bar.querySelectorAll('.idx-card');
      if (!meta || !cards[i]) return;
      const price = meta.regularMarketPrice;
      const prev  = meta.chartPreviousClose || price;
      const chg   = ((price - prev) / prev) * 100;
      const pos   = chg >= 0;
      const curr  = thisMkt === 'india' ? '₹' : '';
      cards[i].innerHTML = `<div class="idx-name">${name}</div>
        <div class="idx-price">${fpIdx(price, curr)}</div>
        <div class="idx-chg ${pos?'up':'dn'}">${pos?'▲':'▼'}${Math.abs(chg).toFixed(2)}%</div>`;
    } catch {}
  });
}

function buildFilters() {
  const chips = document.getElementById('filter-chips');
  const fm    = FILTERS[mkt] || {all:'All'};
  chips.innerHTML = Object.entries(fm).map(([k,v]) =>
    `<div class="chip ${activeFilter===k?'active':''}" onclick="setFilter('${k}',this)">${v}</div>`
  ).join('');
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderActive();
}

function getFiltered() {
  let items = [...allItems];
  if (mkt === 'india') {
    if (activeFilter === 'nifty50')   { const s=new Set(NIFTY50.map(x=>x[0]));   items=items.filter(i=>s.has(i.rawSym)); }
    if (activeFilter === 'banknifty') { const s=new Set(BANKNIFTY.map(x=>x[0])); items=items.filter(i=>s.has(i.rawSym)); }
    if (activeFilter === 'sensex')    { const s=new Set(SENSEX30.map(x=>x[0]));  items=items.filter(i=>s.has(i.rawSym)); }
  } else if (mkt === 'us') {
    if (activeFilter === 'sp100')  { const s=new Set(SP100.map(x=>x[0]));      items=items.filter(i=>s.has(i.rawSym||i.id)); }
    if (activeFilter === 'dow30')  { const s=new Set(DOW30.map(x=>x[0]));      items=items.filter(i=>s.has(i.rawSym||i.id)); }
    if (activeFilter === 'nasdaq') { const s=new Set(NASDAQ_SEL.map(x=>x[0])); items=items.filter(i=>s.has(i.rawSym||i.id)); }
  } else if (mkt === 'crypto') {
    if (activeFilter === 'top50')       items = items.slice(0, 50);
    if (activeFilter === 'top100')      items = items.slice(0, 100);
    if (activeFilter === 'defi')        items = items.filter(i => i.cat === 'defi');
    if (activeFilter === 'stablecoin')  items = items.filter(i => i.cat === 'stablecoin');
  } else if (mkt === 'forex') {
    if (activeFilter === 'asia')   items = items.filter(i => i.cat === 'asia');
    if (activeFilter === 'middle') items = items.filter(i => i.cat === 'middle');
    if (activeFilter === 'major')  items = items.filter(i => !['asia','middle'].includes(i.cat));
  }
  if (searchQ) items = items.filter(i => i.symbol.toLowerCase().includes(searchQ) || i.name.toLowerCase().includes(searchQ));
  return items;
}

function renderActive() {
  const items = getFiltered();
  document.getElementById('meta-count').textContent = items.length + ' assets';
  if (!items.length) {
    document.getElementById('grid').innerHTML = '<div class="error-msg">No results found.</div>';
    return;
  }
  document.getElementById('grid').innerHTML = '<div class="grid">' +
    items.map(item => {
      const gi  = allItems.indexOf(item);
      const {signal} = sig(item.price, item.high, item.low, item.change);
      const pos = item.change >= 0;
      return `<div class="card ${signal.toLowerCase()}-card" data-id="${item.id}" onclick="openModalById(this.dataset.id)">
        <div class="c-sym">${item.symbol}</div>
        <div class="c-name">${item.name}</div>
        <div class="c-badge ${signal}">${signal}</div>
        <div class="c-price" id="cp-${gi}">${fp(item.price, item.currency)}</div>
        <div class="c-chg ${pos?'up':'dn'}" id="cc-${gi}">${pos?'▲':'▼'} ${Math.abs(item.change).toFixed(2)}%</div>
        ${item.bid&&item.ask?`<div style="font-size:0.55rem;color:var(--muted);font-family:var(--fmono);margin-top:2px">B:${item.bid.toFixed(4)} A:${item.ask.toFixed(4)}</div>`:''}
      </div>`;
    }).join('') +
  '</div>';
  updateTicker(items.slice(0, 25));
}

function updateTicker(items) {
  if (!items || !items.length) return;
  const track = document.getElementById('ticker');
  const html = [...items, ...items].map(i => {
    const pos   = i.change >= 0;
    const price = i.currency === '₹'
      ? '₹' + i.price.toLocaleString('en-IN', {maximumFractionDigits:1})
      : i.currency === ''
        ? i.price.toFixed(4)
        : fp(i.price, i.currency);
    return `<div class="t-item"><span class="t-sym">${i.symbol}</span><span>${price}</span><span class="${pos?'t-up':'t-dn'}">${pos?'▲':'▼'}${Math.abs(i.change).toFixed(2)}%</span></div>`;
  }).join('');
  track.innerHTML = html;
  track.style.animation = 'none';
  track.offsetHeight;
  track.style.animation = '';
}

function updateSingleCard(idx) {
  const item = allItems[idx];
  const pe   = document.getElementById('cp-' + idx);
  const ce   = document.getElementById('cc-' + idx);
  if (!pe) return;
  if (item._prev && item.price !== item._prev) {
    const color = item.price > item._prev ? 'var(--green)' : 'var(--red)';
    pe.style.transition = 'none';
    pe.style.color = color;
    setTimeout(() => { pe.style.transition = 'color 0.5s'; pe.style.color = ''; }, 600);
  }
  pe.textContent = fp(item.price, item.currency);
  if (ce) {
    const pos = item.change >= 0;
    ce.textContent = (pos?'▲':'▼') + ' ' + Math.abs(item.change).toFixed(2) + '%';
    ce.className = 'c-chg ' + (pos?'up':'dn');
  }
  if (Math.random() < 0.1) updateTicker(getFiltered().slice(0, 25));
}

function refreshPricesDOM() {
  allItems.forEach((item, i) => {
    const pe = document.getElementById('cp-'+i);
    const ce = document.getElementById('cc-'+i);
    if (!pe) return;
    if (item._prev && item.price !== item._prev) {
      pe.style.color = item.price > item._prev ? 'var(--green)' : 'var(--red)';
      setTimeout(() => { pe.style.color = ''; }, 800);
    }
    pe.textContent = fp(item.price, item.currency);
    if (ce) {
      const pos = item.change >= 0;
      ce.textContent = (pos?'▲':'▼') + ' ' + Math.abs(item.change).toFixed(2) + '%';
      ce.className = 'c-chg ' + (pos?'up':'dn');
    }
  });
}

// ═══════════════════════════════════════════════════════
function startLive() {
  stopLive();
  if (mkt === 'crypto') {
    startBinanceWS();
  } else if (mkt === 'forex') {
    liveTimer = setInterval(liveUpdate, 60000);
  } else {
    liveTimer = setInterval(liveUpdate, 30000);
  }
}

function stopLive() {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  if (wsConn)    { try { wsConn.close(); } catch {} wsConn = null; }
}

function startBinanceWS() {
  const symbols = allItems.slice(0, 40).map(i => i.symbol.toLowerCase() + 'usdt@ticker').join('/');
  const url = 'wss://stream.binance.com:9443/stream?streams=' + symbols;
  try {
    wsConn = new WebSocket(url);
    wsConn.onopen  = () => updateWSStatus(true);
    wsConn.onclose = () => { updateWSStatus(false); setTimeout(() => { if (mkt==='crypto') startBinanceWS(); }, 3000); };
    wsConn.onerror = () => updateWSStatus(false);
    wsConn.onmessage = e => {
      try {
        const d = JSON.parse(e.data).data;
        if (!d?.s) return;
        const sym = d.s.replace('USDT','');
        const idx = allItems.findIndex(i => i.symbol === sym);
        if (idx > -1) {
          const newPrice = parseFloat(d.c);
          if (newPrice && newPrice !== allItems[idx].price) {
            allItems[idx]._prev  = allItems[idx].price;
            allItems[idx].price  = newPrice;
            allItems[idx].change = parseFloat(d.P) || allItems[idx].change;
            updateSingleCard(idx);
          }
        }
      } catch {}
    };
  } catch { liveTimer = setInterval(liveUpdate, 15000); }
}

function updateWSStatus(connected) {
  const dot    = document.querySelector('.live-dot');
  const lbl    = document.querySelector('.live-lbl');
  const badge  = document.getElementById('ws-badge');
  if (dot)   dot.style.background = connected ? 'var(--green)' : 'var(--yellow)';
  if (lbl)   lbl.textContent = connected ? 'LIVE' : 'SYNC';
  if (badge) badge.style.display = connected ? 'inline-flex' : 'none';
}

async function liveUpdate() {
  try {
    if (mkt === 'crypto') {
      const fresh = await fetchCryptoPage(1, 100);
      fresh.forEach(c => {
        const idx = allItems.findIndex(i => i.id === c.id);
        if (idx > -1) {
          allItems[idx]._prev  = allItems[idx].price;
          allItems[idx].price  = c.current_price;
          allItems[idx].change = c.price_change_percentage_24h || 0;
        }
      });
    } else if (mkt === 'forex') {
      const MAJOR = ['EUR','GBP','JPY','INR','CAD','AUD','CHF','CNY'];
      if (!window._avIdx) window._avIdx = 0;
      const toFetch = MAJOR.slice(window._avIdx, window._avIdx + 2);
      window._avIdx = (window._avIdx + 2) % MAJOR.length;
      for (const code of toFetch) {
        const av = await fetchAVPair('USD', code);
        if (!av) continue;
        const idx = allItems.findIndex(i => i.id === 'USD'+code);
        if (idx > -1) {
          const prev = allItems[idx].price;
          allItems[idx]._prev  = prev;
          allItems[idx].price  = av.price;
          allItems[idx].change = prev ? ((av.price-prev)/prev)*100 : 0;
          updateSingleCard(idx);
        }
        await new Promise(r => setTimeout(r, 300));
      }
    } else {
      // Stocks: refresh top 10 visible via stooq batch (one request for all 10)
      const visible = getFiltered().slice(0, 10);
      if (!visible.length) return;
      const syms   = visible.map(item => item.rawSym || item.id);
      const quotes = await stooqBatch(syms);
      const upper  = {};
      for (const [k,v] of Object.entries(quotes)) upper[k.toUpperCase()] = v;
      let changed  = 0;
      visible.forEach(item => {
        const key = (item.rawSym || item.id).toUpperCase();
        const q   = upper[key];
        if (!q) return;
        const idx = allItems.findIndex(a => a.id === item.id);
        if (idx > -1) {
          allItems[idx]._prev  = allItems[idx].price;
          allItems[idx].price  = q.price;
          allItems[idx].change = q.change;
          allItems[idx].high   = q.high;
          allItems[idx].low    = q.low;
          changed++;
        }
      });
      if (changed) refreshPricesDOM();
    }
    refreshPricesDOM();
    updateTicker(getFiltered().slice(0, 25));
    setTimestamp();
    cache[mkt]     = [...allItems];
    cacheTime[mkt] = Date.now();
  } catch (e) { console.warn('liveUpdate:', e); }
}

function getAllExpiries(mkt2) {
  const now = new Date();
  const dates = [];
  if (mkt2 === 'nse') {
    for (let w = 0; w < 12; w++) {
      const d = new Date(now);
      d.setDate(d.getDate() + ((4 - d.getDay() + 7) % 7) + w * 7);
      if (d <= now) d.setDate(d.getDate() + 7);
      dates.push({ label: d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}), type: w===0?'Current Week':'Week '+(w+1), date: d });
    }
  } else if (mkt2 === 'us') {
    for (let w = 0; w < 8; w++) {
      const d = new Date(now);
      d.setDate(d.getDate() + ((5 - d.getDay() + 7) % 7) + w * 7);
      if (d <= now) d.setDate(d.getDate() + 7);
      dates.push({ label: d.toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'}), type: w===0?'This Week':'Week '+(w+1), date: d });
    }
    [3,6,9].forEach(m2 => {
      const d = new Date(now.getFullYear(), now.getMonth()+m2, 1);
      d.setDate(1 + (5 - d.getDay() + 7) % 7 + 14);
      dates.push({ label: d.toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'}), type: 'Quarterly', date: d });
    });
  } else {
    for (let w = 0; w < 6; w++) {
      const d = new Date(now); d.setDate(d.getDate() + 7*(w+1));
      dates.push({ label: d.toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'}), type: 'Week '+(w+1), date: d });
    }
    [1,2,3,6].forEach(m2 => {
      const d = new Date(now.getFullYear(), now.getMonth()+m2+1, 0);
      dates.push({ label: d.toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'}), type: 'Monthly', date: d });
    });
  }
  return dates;
}

function populateExpiries() {
  const sel = document.getElementById('oc-exp');
  sel.innerHTML = '';
  getAllExpiries(ocMkt).forEach((e, i) => {
    const o = document.createElement('option');
    o.value = i; o.text = e.label + ' (' + e.type + ')';
    sel.add(o);
  });
}

function genOC(spot, step, count) {
  const atm = Math.round(spot / step) * step;
  const chain = [];
  for (let i = -count; i <= count; i++) {
    const k = atm + i * step, m = (spot - k) / spot;
    const tv = spot * 0.013 * (1 + Math.random() * 0.4);
    const callLTP = +(Math.max(0, spot-k) + tv * Math.exp(-Math.abs(m)*3)).toFixed(2);
    const putLTP  = +(Math.max(0, k-spot) + tv * Math.exp(-Math.abs(m)*3)).toFixed(2);
    const iv = +(18 + Math.abs(m) * 110 + Math.random() * 3).toFixed(1);
    chain.push({ k, callLTP, putLTP, iv, atm: k===atm,
      cSig: iv<20&&m>0?'BUY':iv>35?'SELL':'HOLD',
      pSig: iv<20&&m<0?'BUY':iv>35?'SELL':'HOLD' });
  }
  return chain;
}

  try {
    if (ocMkt === 'crypto') {
      const ids = {BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',XRP:'ripple',DOGE:'dogecoin'};
      const r = await fetchWithTimeout('https://api.coingecko.com/api/v3/simple/price?ids='+ids[sym]+'&vs_currencies=usd', 5000);
      const d = await r.json(); return d[ids[sym]]?.usd || fb[sym];
    }
    const yf = {NIFTY:'^NSEI',BANKNIFTY:'^NSEBANK',FINNIFTY:'NIFTY_FIN_SERVICE.NS',MIDCPNIFTY:'NIFTY_MIDCAP_100.NS',SENSEX:'^BSESN'}[sym] || sym;
    const meta = await proxyFetch(yf); return meta?.regularMarketPrice || fb[sym] || 100;
  } catch { return fb[sym] || 100; }
}

function getStep(sym, spot) {
  if (ocMkt === 'nse') return { step:{NIFTY:50,BANKNIFTY:100,FINNIFTY:50,MIDCPNIFTY:25,SENSEX:100}[sym]||50, count:10 };
  if (ocMkt === 'us')  return { step: spot>400?5:spot>100?2:1, count:10 };
  return { step: +(spot*0.015).toFixed(spot>1000?-1:spot>100?0:2), count:8 };
}

async function loadOC() {
  const body    = document.getElementById('oc-body');
  const sym     = document.getElementById('oc-sym').value;
  const expIdx  = parseInt(document.getElementById('oc-exp').value) || 0;
  const ocType  = document.getElementById('oc-type').value;
  const expiry  = getAllExpiries(ocMkt)[expIdx];
  body.innerHTML = `<div class="loading"><div class="spinner"></div>Loading ${sym}…</div>`;
  document.getElementById('oc-spot').innerHTML = '';
  const spot = await getSpot(sym);
  const {step,count} = getStep(sym, spot);
  const chain = genOC(spot, step, count);
  const curr  = ocMkt==='nse' ? '₹' : '$';
  const dte   = Math.max(1, Math.round((expiry.date - new Date()) / (1000*60*60*24)));
  document.getElementById('oc-spot').innerHTML = `SPOT: <b>${curr}${spot.toLocaleString()}</b>`;
  const fl2 = n => n >= 100 ? n.toFixed(1) : n.toFixed(2);

  if (ocType === 'futures') {
    const futPrice = spot * (1 + 0.0002 * dte);
    const basis    = futPrice - spot;
    body.innerHTML = `
      <div class="oc-exp-lbl">📅 ${expiry.label} (${expiry.type}) · ${sym} FUTURES · DTE: ${dte}d</div>
      <div style="padding:8px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap;font-family:var(--fmono);font-size:0.7rem;">
        <span>Spot: <b style="color:var(--green)">${curr}${spot.toLocaleString()}</b></span>
        <span>Fut: <b style="color:var(--blue)">${curr}${futPrice.toFixed(2)}</b></span>
        <span>Basis: <b style="color:${basis>0?'var(--green)':'var(--red)'}">${basis>0?'+':''}${basis.toFixed(2)}</b></span>
      </div>
      <div style="overflow-x:auto"><table class="oc-tbl"><thead><tr>
        <th>STRIKE</th><th>FUT PRICE</th><th>BASIS</th><th>OI</th><th>SIGNAL</th>
      </tr></thead><tbody>
      ${chain.map(r => {
        const fp2   = (spot*(1+0.0002*dte+(r.k-spot)/spot*0.1)).toFixed(2);
        const bas2  = (parseFloat(fp2)-r.k).toFixed(2);
        const oi    = Math.floor(Math.random()*50000+10000);
        const sg    = r.k<spot*0.99?'BUY':r.k>spot*1.01?'SELL':'HOLD';
        return `<tr class="${r.atm?'atm':''}">
          <td class="sk">${r.atm?'★ ':''}${curr}${r.k.toLocaleString()}</td>
          <td style="color:var(--blue)">${curr}${fp2}</td>
          <td style="color:${parseFloat(bas2)>0?'var(--green)':'var(--red)'}">${parseFloat(bas2)>0?'+':''}${bas2}</td>
          <td style="color:var(--muted)">${(oi/1000).toFixed(1)}K</td>
          <td><span class="oc-sig ${sg}">${sg}</span></td></tr>`;
      }).join('')}
      </tbody></table></div>
      <div class="oc-foot">⚠ Model-generated data. Use NSE/broker for live data.</div>`;
    return;
  }

  body.innerHTML = `
    <div class="oc-exp-lbl">📅 ${expiry.label} (${expiry.type}) · ${sym} OPTIONS · DTE: ${dte}d</div>
    <div style="overflow-x:auto"><table class="oc-tbl"><thead><tr>
      <th class="c-side">SIG</th><th class="c-side">IV</th><th class="c-side">CALL LTP</th>
      <th>STRIKE</th>
      <th class="p-side">PUT LTP</th><th class="p-side">IV</th><th class="p-side">SIG</th>
    </tr></thead><tbody>
    ${chain.map(r => {
      const adjIV = (r.iv * (1 + dte/365)).toFixed(1);
      return `<tr class="${r.atm?'atm':''}">
        <td class="c-side"><span class="oc-sig ${r.cSig}">${r.cSig}</span></td>
        <td class="c-side">${adjIV}%</td><td class="c-side">${fl2(r.callLTP)}</td>
        <td class="sk">${r.atm?'★ ':''}${curr}${r.k.toLocaleString()}</td>
        <td class="p-side">${fl2(r.putLTP)}</td><td class="p-side">${adjIV}%</td>
        <td class="p-side"><span class="oc-sig ${r.pSig}">${r.pSig}</span></td>
      </tr>`;
    }).join('')}
    </tbody></table></div>
    <div class="oc-foot">★ ATM · 🔵 CALL · 🩷 PUT · DTE = Days To Expiry<br>⚠ Model-generated. Use NSE/broker for live data.</div>`;
}

// ═══════════════════════════════════════════════════════
// TOUCH HANDLING — distinguish tap from scroll
// ═══════════════════════════════════════════════════════
let _touchStartX = 0, _touchStartY = 0;

function touchStart(e) {
  _touchStartX = e.touches[0].clientX;
  _touchStartY = e.touches[0].clientY;
}

function touchEnd(e, id) {
  const dx = Math.abs(e.changedTouches[0].clientX - _touchStartX);
  const dy = Math.abs(e.changedTouches[0].clientY - _touchStartY);
  // Only open if finger barely moved (tap, not scroll)
  if (dx < 8 && dy < 8) {
    e.preventDefault();
    openModalById(id);
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildFilters();
// Rank proxies by speed first, then load — makes every subsequent request faster
loadMkt().then(() => setTimeout(prefetchAll, 4000));


</script>
