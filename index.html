<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SignalPro — Live Market Signals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --fm:'Inter','Roboto',-apple-system,system-ui,sans-serif;
  --fmono:'JetBrains Mono','Roboto Mono','Courier New',monospace;
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:#252535;
  --text:#e8e8f0;--muted:#5a5a78;--card:#12121c;
  --green:#00f5a0;--red:#ff4466;--yellow:#ffd166;--blue:#4d8cff;
}
.light{
  --bg:#f0f0f8;--bg2:#e6e6f0;--bg3:#dadaec;--border:#c8c8dc;
  --text:#0d0d20;--muted:#5a5a78;--card:#ffffff;
  --green:#00915e;--red:#cc1133;--yellow:#b07000;--blue:#1a44cc;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:var(--fm);background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-size:1.25rem;font-weight:900;letter-spacing:-1px;}.logo b{color:var(--green);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.live-badge{display:flex;align-items:center;gap:4px;background:rgba(0,245,160,0.1);border:1px solid rgba(0,245,160,0.2);border-radius:20px;padding:4px 10px;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.live-lbl{font-size:0.65rem;font-weight:700;color:var(--green);font-family:var(--fmono);}
.theme-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:14px;cursor:pointer;font-size:0.7rem;font-weight:600;}

/* MARKET TABS */
.mkt-tabs{display:flex;padding:8px 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;gap:2px;}
.mkt-tab{padding:7px 13px;border-radius:7px 7px 0 0;cursor:pointer;font-size:0.75rem;font-weight:700;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--muted);white-space:nowrap;transition:all 0.15s;}
.mkt-tab.active{background:var(--bg);color:var(--green);border-color:var(--border);border-bottom-color:var(--bg);}

/* TICKER */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);height:30px;overflow:hidden;position:relative;}
.ticker-track{display:flex;position:absolute;animation:scroll-ticker 60s linear infinite;white-space:nowrap;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.t-item{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:30px;border-right:1px solid var(--border);font-family:var(--fmono);font-size:0.68rem;}
.t-sym{font-weight:700;}
.t-up{color:var(--green);}
.t-dn{color:var(--red);}

/* INDICES PINNED */
.indices-bar{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.indices-bar-inner{display:flex;gap:8px;min-width:max-content;}
.idx-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;min-width:110px;flex-shrink:0;}
.idx-name{font-size:0.6rem;color:var(--muted);font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idx-price{font-size:0.88rem;font-weight:700;font-family:var(--fmono);}
.idx-chg{font-size:0.65rem;font-family:var(--fmono);font-weight:600;margin-top:1px;}
.idx-chg.up{color:var(--green);}
.idx-chg.dn{color:var(--red);}
.idx-loading{font-size:0.65rem;color:var(--muted);font-family:var(--fmono);}

/* FILTER CHIPS */
.filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg);}
.filter-inner{display:flex;gap:6px;min-width:max-content;}
.chip{padding:5px 12px;border-radius:16px;font-size:0.7rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);white-space:nowrap;transition:all 0.15s;}
.chip.active{background:var(--green);color:var(--bg);border-color:var(--green);}

/* SEARCH + REFRESH */
.ctrl-bar{display:flex;gap:8px;padding:10px 16px;background:var(--bg);}
.s-inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);font-family:var(--fm);font-size:0.82rem;outline:none;}
.s-inp:focus{border-color:var(--green);}
.s-inp::placeholder{color:var(--muted);}
.ref-btn{background:transparent;border:1px solid var(--green);color:var(--green);padding:8px 13px;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.75rem;}

/* META */
.meta{display:flex;justify-content:space-between;padding:4px 16px 8px;font-family:var(--fmono);font-size:0.65rem;color:var(--muted);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;padding:0 16px 80px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.1s;}
.card:active{transform:scale(0.97);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.card.buy-card::before{background:var(--green);}
.card.sell-card::before{background:var(--red);}
.card.hold-card::before{background:var(--yellow);}
.c-sym{font-size:0.8rem;font-weight:800;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-name{font-size:0.58rem;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-badge{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:4px;font-size:0.58rem;font-weight:700;font-family:var(--fmono);}
.c-badge.BUY{background:rgba(0,245,160,0.13);color:var(--green);}
.c-badge.SELL{background:rgba(255,68,102,0.13);color:var(--red);}
.c-badge.HOLD{background:rgba(255,209,102,0.13);color:var(--yellow);}
.c-price{font-size:1rem;font-weight:700;font-family:var(--fmono);margin-top:7px;letter-spacing:-0.5px;transition:color 0.4s;}
.c-chg{font-size:0.68rem;font-family:var(--fmono);font-weight:600;margin-top:2px;}
.c-chg.up{color:var(--green);}
.c-chg.dn{color:var(--red);}

/* LOADING / ERROR */
.loading{text-align:center;padding:50px 20px;color:var(--muted);font-family:var(--fmono);font-size:0.78rem;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:40px 20px;color:var(--red);font-family:var(--fmono);font-size:0.74rem;line-height:2.2;}
.load-more{text-align:center;padding:16px;font-size:0.75rem;color:var(--muted);font-family:var(--fmono);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi 0.18s;}
@media(min-width:600px){.mo{align-items:center;padding:20px;}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mo-box{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 18px 28px;width:100%;max-width:450px;animation:su 0.2s ease;position:relative;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.mo-box{border-radius:20px;}}
@keyframes su{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-x{position:absolute;top:12px;right:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:0.82rem;display:flex;align-items:center;justify-content:center;}
.mo-sym{font-size:1.4rem;font-weight:900;}
.mo-name{color:var(--muted);font-size:0.75rem;margin-top:2px;}
.mo-price{font-size:1.8rem;font-weight:700;font-family:var(--fmono);margin:10px 0 2px;letter-spacing:-1px;}
.mo-chg{font-size:0.75rem;font-family:var(--fmono);font-weight:600;}
.mo-chg.up{color:var(--green);}
.mo-chg.dn{color:var(--red);}
.sig-box{padding:10px 14px;border-radius:10px;font-size:0.88rem;font-weight:800;text-align:center;margin:12px 0;letter-spacing:0.5px;}
.sig-box.BUY{background:rgba(0,245,160,0.09);color:var(--green);border:1px solid rgba(0,245,160,0.25);}
.sig-box.SELL{background:rgba(255,68,102,0.09);color:var(--red);border:1px solid rgba(255,68,102,0.25);}
.sig-box.HOLD{background:rgba(255,209,102,0.09);color:var(--yellow);border:1px solid rgba(255,209,102,0.25);}
.lvs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.lv{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 11px;}
.lv-lbl{font-size:0.58rem;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.lv-val{font-size:0.88rem;font-weight:700;font-family:var(--fmono);}
.lv-val.e{color:var(--blue);}
.lv-val.tp{color:var(--green);}
.lv-val.sl{color:var(--red);}
.ind-sec{margin-top:13px;}
.ind-ttl{font-size:0.63rem;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:6px;}
.ind-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);gap:5px;}
.ind-row:last-child{border-bottom:none;}
.ind-n{color:var(--muted);font-family:var(--fmono);font-size:0.66rem;}
.ind-v{font-weight:700;font-family:var(--fmono);font-size:0.7rem;}
.ind-s{font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:3px;}
.ind-s.bull{background:rgba(0,245,160,0.13);color:var(--green);}
.ind-s.bear{background:rgba(255,68,102,0.13);color:var(--red);}
.ind-s.neut{background:rgba(255,209,102,0.13);color:var(--yellow);}
.mo-disc{font-size:0.6rem;color:var(--muted);text-align:center;margin-top:12px;padding-top:11px;border-top:1px solid var(--border);line-height:1.6;}

/* OPTION CHAIN */
.oc-scr{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;}
.oc-hdr{display:flex;align-items:center;gap:9px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
.oc-back{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:0.72rem;font-weight:700;}
.oc-title{font-size:0.92rem;font-weight:800;flex:1;}.oc-title b{color:var(--green);}
.oc-mkt-tabs{display:flex;gap:5px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.oc-mt{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:700;background:var(--bg3);color:var(--muted);border:1px solid var(--border);white-space:nowrap;}
.oc-mt.active{background:var(--green);color:var(--bg);border-color:var(--green);}
.oc-ctrl{display:flex;gap:6px;padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.oc-sel{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:0.75rem;outline:none;}
.oc-btn{background:var(--green);border:none;color:var(--bg);padding:6px 14px;border-radius:7px;font-weight:800;font-size:0.72rem;cursor:pointer;}
.oc-spot{font-size:0.7rem;color:var(--muted);font-family:var(--fmono);margin-left:auto;}
.oc-spot b{color:var(--green);}
.oc-body{flex:1;overflow-y:auto;}
.oc-exp-lbl{font-size:0.62rem;color:var(--muted);font-family:var(--fmono);padding:7px 16px 3px;letter-spacing:1px;text-transform:uppercase;}
.oc-tbl{width:100%;border-collapse:collapse;}
.oc-tbl tr.atm{background:rgba(99,179,237,0.08);border-top:1px solid rgba(99,179,237,0.3);border-bottom:1px solid rgba(99,179,237,0.3);}
.oc-tbl tr.atm .sk{color:var(--blue);font-weight:700;}
.oc-sig{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.6rem;font-weight:700;letter-spacing:0.5px;}
.oc-sig.BUY{background:rgba(72,199,142,0.15);color:var(--green);border:1px solid rgba(72,199,142,0.3);}
.oc-sig.SELL{background:rgba(255,99,132,0.15);color:var(--red);border:1px solid rgba(255,99,132,0.3);}
.oc-sig.HOLD{background:rgba(255,193,7,0.12);color:var(--yellow);border:1px solid rgba(255,193,7,0.25);}
.oc-tbl th{font-size:0.58rem;font-weight:700;color:var(--muted);padding:6px 4px;text-align:center;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;letter-spacing:0.5px;}
.oc-tbl td{font-size:0.68rem;padding:6px 4px;text-align:center;border-bottom:1px solid var(--border);font-family:var(--fmono);}
.oc-tbl tr.atm td{background:rgba(0,245,160,0.05);}
.oc-tbl tr.atm .sk{color:var(--green);font-weight:800;}
.c-side{color:#7eb8ff;}.p-side{color:#ffb3c6;}
.sk{font-weight:700;background:var(--bg3)!important;font-size:0.7rem;}
.oc-sig.BUY{color:var(--green);font-weight:800;font-size:0.6rem;}
.oc-sig.SELL{color:var(--red);font-weight:800;font-size:0.6rem;}
.oc-sig.HOLD{color:var(--yellow);font-weight:700;font-size:0.6rem;}
.oc-foot{padding:10px 16px;font-size:0.6rem;color:var(--muted);font-family:var(--fmono);line-height:1.9;border-top:1px solid var(--border);}
/* WS speed indicator */
.ws-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(77,140,255,0.12);border:1px solid rgba(77,140,255,0.25);border-radius:12px;padding:3px 8px;font-size:0.62rem;color:var(--blue);font-family:var(--fmono);font-weight:700;}

/* ── LEGAL PAGES ── */
.legal-scr{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;flex-direction:column;overflow-y:auto;}
.legal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.legal-back{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.75rem;font-weight:700;}
.legal-back:hover{border-color:var(--green);color:var(--green);}
.legal-body{max-width:760px;margin:0 auto;padding:28px 20px 60px;width:100%;}
.legal-badge{display:inline-block;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;border-radius:6px;margin-bottom:16px;font-family:var(--fmono);}
.legal-body h1{font-size:1.8rem;font-weight:900;letter-spacing:-0.5px;margin-bottom:8px;}
.legal-subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:8px;}
.legal-updated{color:var(--muted);font-size:0.75rem;font-family:var(--fmono);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.warn-box{background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.3);border-radius:12px;padding:16px 20px;margin-bottom:28px;}
.warn-box .warn-title{color:var(--red);font-weight:800;font-size:0.85rem;margin-bottom:6px;}
.warn-box p{color:#ffaaaa;font-size:0.82rem;line-height:1.6;}
.legal-body section{margin-bottom:32px;}
.legal-body h2{font-size:0.9rem;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.legal-body p{color:#c8c8d8;font-size:0.875rem;margin-bottom:12px;line-height:1.7;}
.legal-body ul{padding-left:20px;margin-bottom:12px;}
.legal-body ul li{color:#c8c8d8;font-size:0.875rem;margin-bottom:6px;line-height:1.6;}
.legal-body ul li::marker{color:var(--green);}
.legal-body strong{color:var(--text);font-weight:700;}
.legal-body a{color:var(--green);}
.contact-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:8px;}
.contact-box p{margin:0;font-size:0.85rem;}
.legal-footer{background:var(--bg2);border-top:1px solid var(--border);padding:20px;text-align:center;margin-top:auto;}
.legal-footer p{color:var(--muted);font-size:0.72rem;margin-bottom:8px;}
.legal-footer-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.legal-footer-links button{background:none;border:none;color:var(--muted);font-size:0.72rem;cursor:pointer;font-family:var(--fm);}
.legal-footer-links button:hover{color:var(--green);}

/* ── AD UNITS ── */
.ad-unit{width:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.ad-unit-inline{width:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg2);border-radius:12px;border:1px solid var(--border);margin:4px 0;}
.ad-label{font-size:0.55rem;color:var(--muted);text-align:center;letter-spacing:1px;text-transform:uppercase;padding:2px 0 0 0;font-family:var(--fmono);}
/* Placeholder style - remove when real ads go in */
.ad-placeholder{background:var(--bg3);border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.7rem;font-family:var(--fmono);letter-spacing:1px;}

/* ── TAB SWITCH AD ── */
.tab-ad-bar{width:100%;background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 0;text-align:center;overflow:hidden;transition:height 0.3s;display:none;}
.tab-ad-bar.visible{display:block;}

/* ── CLOSE AD OVERLAY ── */
.close-ad-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);display:none;align-items:flex-end;justify-content:center;padding-bottom:0;}
.close-ad-overlay.visible{display:flex;}
.close-ad-box{background:var(--bg2);border-top:1px solid var(--border);width:100%;padding:12px 16px 28px;text-align:center;animation:slideUp 0.25s ease;}
.close-ad-skip{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.close-ad-skip span{color:var(--muted);font-size:0.7rem;font-family:var(--fmono);}
.close-ad-skip button{background:var(--green);border:1px solid var(--green);color:#000;padding:6px 18px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:700;font-family:var(--fm);}
.close-ad-skip button:hover{border-color:var(--green);color:var(--green);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── SEARCH BAR AD ── */
.search-ad{padding:0 16px 10px 16px;background:var(--bg);}
.search-ad-inner{background:var(--bg3);border:1px dashed var(--border);border-radius:9px;height:40px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--muted);letter-spacing:1px;font-family:var(--fmono);}
</style>

<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">Signal<b>Pro</b></div>
  <div class="hdr-r">
    <div class="live-badge"><div class="live-dot"></div><span class="live-lbl">LIVE</span></div>
    <div class="ws-badge" id="ws-badge" style="display:none">⚡ WS</div>
    <button class="theme-btn" onclick="toggleTheme()">☀/☾</button>
  </div>
</div>

<!-- MARKET TABS -->
<div class="mkt-tabs">
  <div class="mkt-tab active" onclick="switchMkt('crypto',this)">₿ Crypto</div>
  <div class="mkt-tab" onclick="switchMkt('india',this)">🇮🇳 India</div>
